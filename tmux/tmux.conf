set-option -g @mauve "#cba6f7"
set-option -g @green "#a6e3a1"
set-option -g @text "#cdd6f4"
set-option -g @crust "#11111b"
set-option -g @surface0 "#313244"

set-option -g pane-active-border "fg=#{@aqua}"
set-option -g pane-border-style "fg=#{@bg3}"
set-option -g status-style "bg=#{@bg0_h} fg=#{@fg}"

set-option -g status-left-style none
set -g status-left-length 60
set-option -g status-left "#{?#{==:#{client_key_table},prefix}, #[fg=#{@red}]•,#[fg=#{@fg4}] •} #[fg=#{@aqua}] Session:#[fg=#{@fg}] #S #[fg=#{@aqua}]Window:#[fg=#{@fg}] #I#[fg=#{@aqua}]:#[fg=#{@fg}]#W"

set-option -g status-right-style none
set -g status-right-length 120
set -g status-right '#[fg=#{@aqua}]#(if git -C "#{pane_current_path}" rev-parse --is-inside-work-tree 2>/dev/null; then echo "Branch: #[fg=#{@fg}]$(git -C "#{pane_current_path}" rev-parse --abbrev-ref HEAD)"; fi) #[fg=#{@aqua}] Proc: #[fg=#{@fg}]#W #[fg=#{@aqua}] Path: #[fg=#{@fg}]#{p:pane_current_path} #[fg=#{@aqua}] Time: #[fg=#{@fg}]%H:#[fg=#{@fg}]%M '

# Overrides default tmux window name and id
set -g window-status-separator ""
set -g window-status-current-format ""
set -g window-status-format ""

