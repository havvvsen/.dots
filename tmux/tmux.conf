set-option -g @bg "#282828";
set-option -g @bg0_h "#1d2021";
set-option -g @bg0_s "#32302f";
set-option -g @bg0 "#282828";
set-option -g @bg1 "#3c3836";
set-option -g @bg2 "#504945";
set-option -g @bg3 "#665c54";
set-option -g @bg4 "#7c6f64";

set-option -g @fg "#ebdbb2";
set-option -g @fg0 "#fbf1c7";
set-option -g @fg1 "#ebdbb2";
set-option -g @fg2 "#d5c4a1";
set-option -g @fg3 "#bdae93";
set-option -g @fg4 "#a89984";

set-option -g @red "#cc241d";
set-option -g @green "#98971a";
set-option -g @yellow "#d78821";
set-option -g @blue "#458588";
set-option -g @purple "#b16286";
set-option -g @aqua "#689d6a";
set-option -g @orange "#d65d0e";
set-option -g @gray "#a89984";


set  -g default-shell "/usr/bin/fish"

set -g status-keys vi
set -g mode-keys   vi

unbind C-b
set -g prefix C-a

set  -g mouse             on
setw -g aggressive-resize off
setw -g clock-mode-style  12
set  -g history-limit     2000

set-option -g status-position top
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded."

# set -gq allow-passthrough off
set -g escape-time 10
set -g visual-activity off
setw -g aggressive-resize off
setw -g clock-mode-style 12

bind c copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key b set-option status
bind % split-window -h -c "#{pane_current_path}"
bind \" split-window -v -c "#{pane_current_path}"

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

