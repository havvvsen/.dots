[general]
import = [
  "~/.config/alacritty/themes/catppuccin-mocha.toml"
]

[terminal]
shell = "/usr/bin/zellij"

[env]
TERM = "xterm-256color"

[window]
startup_mode = "Windowed" # Windowed | Maximized | Fullscreen
decorations = "Full" # "Full" | "None" | "Transparent" | "Buttonless"
dimensions = { columns = 150, lines = 35 } # columns x axis, lines y axis
padding = { x = 5, y = 3}
blur = false
opacity = 0.95
dynamic_title = false
title = "Alacritty"

[font]
size = 11.25

normal = { family = "VictorMono Nerd Font",style =  "Regular" }
bold = { family = "VictorMono Nerd Font", style = "Bold" }
italic = { family = "VictorMono Nerd Font", style = "Italic" }
bold_italic = { family = "VictorMono Nerd Font", style = "Bold Italic" }

[keyboard]
bindings = [
    { key = "C", mods = "Control|Shift", chars = "\u0003" },
    { key = "C", mods  = "Control",  action = "CopySelection" },
    { key = "V", mods  = "Control",  action = "PasteSelection" },
]

[selection]
save_to_clipboard = false
